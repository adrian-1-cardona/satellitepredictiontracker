services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: satellite_tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d satellite_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg2://tracker:tracker_dev_password@postgres:5432/satellite_tracker
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars
      TLE_CACHE_PATH: data/stations.tle
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A app.tasks:celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg2://tracker:tracker_dev_password@postgres:5432/satellite_tracker
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars
      TLE_CACHE_PATH: data/stations.tle
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A app.tasks:celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg2://tracker:tracker_dev_password@postgres:5432/satellite_tracker
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars
      TLE_CACHE_PATH: data/stations.tle
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tracker.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

