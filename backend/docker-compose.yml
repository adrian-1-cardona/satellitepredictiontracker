services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: satellite_tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in ../.env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d satellite_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in ../.env}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in ../.env}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:?Set CELERY_BROKER_URL in ../.env}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:?Set CELERY_RESULT_BACKEND in ../.env}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in ../.env}
      ADMIN_TOKEN: ${ADMIN_TOKEN:?Set ADMIN_TOKEN in ../.env}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in ../.env}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-40}
      DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-10}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-3600}
      FORCE_HTTPS: ${FORCE_HTTPS:-false}
      TLE_CACHE_PATH: data/stations.tle
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../data:/app/data

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A app.tasks:celery_app worker --loglevel=info
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in ../.env}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in ../.env}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:?Set CELERY_BROKER_URL in ../.env}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:?Set CELERY_RESULT_BACKEND in ../.env}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in ../.env}
      ADMIN_TOKEN: ${ADMIN_TOKEN:?Set ADMIN_TOKEN in ../.env}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in ../.env}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-40}
      DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-10}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-3600}
      TLE_CACHE_PATH: data/stations.tle
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../data:/app/data

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A app.tasks:celery_app beat --loglevel=info
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in ../.env}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in ../.env}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:?Set CELERY_BROKER_URL in ../.env}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:?Set CELERY_RESULT_BACKEND in ../.env}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in ../.env}
      ADMIN_TOKEN: ${ADMIN_TOKEN:?Set ADMIN_TOKEN in ../.env}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in ../.env}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-40}
      DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-10}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-3600}
      TLE_CACHE_PATH: data/stations.tle
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../data:/app/data

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@tracker.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?Set PGADMIN_DEFAULT_PASSWORD in ../.env}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    secrets:
      - admin_token
    depends_on:
      api:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in ../.env}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:latest
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      loki:
        condition: service_started

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:

secrets:
  admin_token:
    file: ${ADMIN_TOKEN_FILE:?Set ADMIN_TOKEN_FILE in ../.env}
