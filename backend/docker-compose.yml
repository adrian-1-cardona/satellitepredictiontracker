services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: satellite_tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d satellite_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://tracker:tracker_dev_password@postgres:5432/satellite_tracker
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars
      TLE_CACHE_PATH: data/stations.tle
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../data:/app/data

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A app.tasks:celery_app worker --loglevel=info
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://tracker:tracker_dev_password@postgres:5432/satellite_tracker
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars
      TLE_CACHE_PATH: data/stations.tle
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../data:/app/data

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A app.tasks:celery_app beat --loglevel=info
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://tracker:tracker_dev_password@postgres:5432/satellite_tracker
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars
      TLE_CACHE_PATH: data/stations.tle
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../data:/app/data

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tracker.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:latest
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      loki:
        condition: service_started

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:

