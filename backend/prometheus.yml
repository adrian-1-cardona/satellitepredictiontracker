global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

scrape_configs:
  - job_name: "satellite-tracker-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /run/secrets/admin_token
    scrape_interval: 5s
